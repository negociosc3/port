<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Almeida — Portfólio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 300;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 24px;
        }

        header {
            padding: 80px 0 48px;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: #ffffff;
        }

        header p {
            margin-top: 8px;
            font-size: 0.95rem;
            color: #888;
        }

        section {
            padding: 60px 0;
        }

        section+section {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 32px;
            text-align: center;
        }

        /* ── Carrossel ── */
        .carousel-wrap {
            position: relative;
            overflow: hidden;
        }

        .carousel-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .carousel-track {
            display: flex;
            transition: transform 500ms ease-out;
            will-change: transform;
        }

        .carousel-slide {
            flex: 0 0 100%;
            padding: 0 8px;
        }

        .carousel-slide video {
            width: 100%;
            border-radius: 10px;
            display: block;
            background: #000;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            outline: none;
            cursor: pointer;
        }

        .carousel-slide .video-label {
            margin-top: 12px;
            font-size: 0.85rem;
            font-weight: 400;
            color: #aaa;
            text-align: center;
            letter-spacing: 0.01em;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
            background: rgba(255, 255, 255, 0.07);
            border: none;
            color: #ccc;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            backdrop-filter: blur(4px);
        }

        .carousel-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .carousel-btn.prev {
            left: 4px;
        }

        .carousel-btn.next {
            right: 4px;
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .carousel-dots button {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: none;
            background: #333;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .carousel-dots button.is-active {
            background: #e0e0e0;
            transform: scale(1.3);
        }

        /* ── Seção 2 – Grid de sites ── */
        .sites-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .site-card {
            text-align: center;
        }

        .site-card .site-label {
            font-size: 0.85rem;
            font-weight: 400;
            color: #aaa;
            margin-bottom: 12px;
        }

        .site-thumb {
            display: block;
            max-width: 280px;
            width: 100%;
            border-radius: 12px;
            border: 1px solid #222;
            overflow: hidden;
            transition: border-color 0.2s, opacity 0.2s;
            cursor: pointer;
        }

        .site-thumb:hover {
            border-color: #555;
            opacity: 0.85;
        }

        .site-thumb img {
            display: block;
            width: 100%;
            height: auto;
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
            padding: 16px;
        }

        .modal-overlay.is-open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.6rem;
            cursor: pointer;
            z-index: 10;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .modal-scroll {
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 10px;
            max-width: 95vw;
        }

        .modal-scroll img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .modal-buttons a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 400;
            color: #e0e0e0;
            transition: background 0.2s, border-color 0.2s;
        }

        .modal-buttons a:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #666;
        }

        .modal-buttons a img {
            height: 20px;
            width: auto;
            display: block;
        }

        /* ── Footer ── */
        footer {
            padding: 40px 0 32px;
            text-align: center;
            font-size: 0.8rem;
            color: #444;
        }

        @media (min-width: 768px) {
            .carousel-slide {
                flex: 0 0 50%;
            }

            header h1 {
                font-size: 2.4rem;
            }

            .sites-grid {
                flex-direction: row;
                justify-content: center;
                align-items: flex-start;
                gap: 48px;
            }
        }

        @media (min-width: 1024px) {
            .carousel-slide {
                flex: 0 0 33.333%;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <h1>Gabriel Almeida</h1>
            <p>Desenvolvimento web · Design · Front‑end</p>
        </div>
    </header>

    <!-- Seção 1 – Carrossel de Vídeos -->
    <section>
        <div class="container">
            <h2 class="section-title">Projetos em vídeo</h2>
            <div class="carousel-container">
                <div class="carousel-wrap" id="carousel">
                    <div class="carousel-track" id="carouselTrack"></div>
                    <button class="carousel-btn prev" id="carouselPrev" aria-label="Anterior">‹</button>
                    <button class="carousel-btn next" id="carouselNext" aria-label="Próximo">›</button>
                </div>
                <div class="carousel-dots" id="carouselDots"></div>
            </div>
        </div>
    </section>

    <!-- Seção 2 – Exemplos de sites -->
    <section>
        <div class="container">
            <h2 class="section-title">Exemplos de criação de sites</h2>
            <div class="sites-grid">
                <!-- Apta Odonto -->
                <div class="site-card">
                    <div class="site-label">Site da Apta Odonto</div>
                    <a href="./a/" class="site-thumb" target="_blank">
                        <img src="./a.png" alt="Site Apta Odonto">
                    </a>
                </div>
                <!-- RJ Andaimes -->
                <div class="site-card">
                    <div class="site-label">Site da RJ Andaimes</div>

                    <div class="site-thumb" id="rjThumb">
                        <img src="./rj.png" alt="Site RJ Andaimes">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Modal RJ Andaimes -->
    <div class="modal-overlay" id="rjModal">
        <button class="modal-close" id="rjModalClose" aria-label="Fechar">✕</button>

        <div class="modal-scroll">
            <img src="./rj.png" alt="Site RJ Andaimes">
        </div>
        <p style="color:#aaa;font-size:0.85rem;text-align:center;margin-top:16px;">O cliente tirou o site do ar, mas eu
            guardei os prints 👇🏽</p>
        <div class="modal-buttons">
            <a href="./rjpc.png" download="rj-andaimes-desktop">
                <img src="./rjpc.png" alt=""> Desktop
            </a>
            <a href="./rjcel.jpg" id="rjCelBtn" target="_blank">📱 Celular</a>
        </div>
    </div>

    <footer>
        <div class="container">
            Gabriel Almeida &mdash; <span id="year"></span>
        </div>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // ── Carrossel ──
        const videos = [
            { src: './biografandosucessos Carol.mp4', label: 'Carol — Biografando Sucessos' },
            { src: './VD 40 2.mp4', label: 'VD 40' },
            { src: './Zen Shiasu.mp4', label: 'Zen Shiasu' },
            { src: './VD 40.mp4', label: 'VD 40 – Versão 1' },
            { src: './biografandosucessos 2 Enuzia.mp4', label: 'Enuzia — Biografando Sucessos' },
            { src: './App Cursa Vídeo.mp4', label: 'App Cursa' },
            { src: './Corretora no Texas.mp4', label: 'Corretora no Texas' },
        ];

        const track = document.getElementById('carouselTrack');
        const dotsContainer = document.getElementById('carouselDots');
        const prevBtn = document.getElementById('carouselPrev');
        const nextBtn = document.getElementById('carouselNext');

        let slidesCount = videos.length;
        let currentIndex = slidesCount;
        let autoplayTimer = null;

        function createSlide(v) {
            const slide = document.createElement('div');
            slide.className = 'carousel-slide';
            slide.innerHTML = `
                <video src="${v.src}" preload="metadata" muted loop playsinline controls></video>
                <div class="video-label">${v.label}</div>
            `;
            return slide;
        }

        const clonesBefore = [];
        const clonesAfter = [];
        for (let i = 0; i < slidesCount; i++) {
            clonesBefore.push(createSlide(videos[(slidesCount - 1 - i + slidesCount) % slidesCount]));
        }
        videos.forEach(v => track.appendChild(createSlide(v)));
        for (let i = 0; i < slidesCount; i++) {
            clonesAfter.push(createSlide(videos[i]));
        }
        clonesAfter.forEach(c => track.appendChild(c));
        clonesBefore.reverse().forEach(c => track.prepend(c));
        currentIndex = slidesCount;

        for (let i = 0; i < slidesCount; i++) {
            const dot = document.createElement('button');
            dot.className = i === 0 ? 'is-active' : '';
            dot.setAttribute('aria-label', `Slide ${i + 1}`);
            dot.addEventListener('click', () => { goTo(i); restartAutoplay(); });
            dotsContainer.appendChild(dot);
        }

        function getVisibleCount() {
            return window.innerWidth >= 1024 ? 3 : window.innerWidth >= 768 ? 2 : 1;
        }

        function goTo(index, smooth = true) {
            currentIndex = index;
            updateCarousel(smooth);
        }

        function updateCarousel(smooth = true) {
            const slideWidth = track.querySelector('.carousel-slide').offsetWidth;
            if (!slideWidth) return;
            if (!smooth) {
                track.style.transition = 'none';
            } else {
                track.style.transition = 'transform 500ms ease-out';
            }
            track.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
            const dots = dotsContainer.querySelectorAll('button');
            const realIndex = ((currentIndex - slidesCount) % slidesCount + slidesCount) % slidesCount;
            dots.forEach((d, i) => d.classList.toggle('is-active', i === realIndex));
            const allSlides = track.querySelectorAll('.carousel-slide');
            allSlides.forEach((slide, i) => {
                const video = slide.querySelector('video');
                if (!video) return;
                if (i === currentIndex) {
                    video.play().catch(() => { });
                } else {
                    video.pause();
                    video.currentTime = 0;
                }
            });
        }

        function next() { goTo(currentIndex + 1); }

        function prev() { goTo(currentIndex - 1); }

        function handleLoop() {
            const slideWidth = track.querySelector('.carousel-slide').offsetWidth;
            const visible = getVisibleCount();
            if (currentIndex >= slidesCount * 2 - visible) {
                track.style.transition = 'none';
                currentIndex = slidesCount;
                track.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
                requestAnimationFrame(() => { track.style.transition = 'transform 500ms ease-out'; });
            }
            if (currentIndex < slidesCount - (slidesCount - visible)) {
                track.style.transition = 'none';
                currentIndex = slidesCount * 2 - visible - 1;
                track.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
                requestAnimationFrame(() => { track.style.transition = 'transform 500ms ease-out'; });
            }
        }

        function startAutoplay() {
            stopAutoplay();
            autoplayTimer = setInterval(() => { next(); }, 5000);
        }

        function stopAutoplay() { if (autoplayTimer) clearInterval(autoplayTimer); }

        function restartAutoplay() { startAutoplay(); }

        track.addEventListener('transitionend', handleLoop);
        prevBtn.addEventListener('click', () => {
            prev();
            restartAutoplay();
        });
        nextBtn.addEventListener('click', () => {
            next();
            restartAutoplay();
        });

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                const visible = getVisibleCount();
                if (currentIndex > slidesCount - visible) {
                    goTo(slidesCount - visible);
                } else {
                    updateCarousel();
                }
            }, 150);
        });

        let touchStartX = 0;
        let touchEndX = 0;
        const wrap = document.getElementById('carousel');
        wrap.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        wrap.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff < 0) {
                    next();
                    restartAutoplay();
                } else {
                    prev();
                    restartAutoplay();
                }
            }
        }, { passive: true });

        wrap.addEventListener('mouseenter', stopAutoplay);
        wrap.addEventListener('mouseleave', startAutoplay);

        updateCarousel(false);
        startAutoplay();

        // ── Modal RJ ──
        const rjThumb = document.getElementById('rjThumb');
        const rjModal = document.getElementById('rjModal');
        const rjModalClose = document.getElementById('rjModalClose');

        function openModal() {
            rjModal.classList.add('is-open');
            document.body.style.overflow = 'hidden';
            history.pushState({ modal: 'rj' }, '');
        }

        function closeModal() {
            rjModal.classList.remove('is-open');
            document.body.style.overflow = '';
        }

        rjThumb.addEventListener('click', openModal);
        rjModalClose.addEventListener('click', closeModal);

        rjModal.addEventListener('click', (e) => {
            if (e.target === rjModal) closeModal();
        });

        // Fecha com botão voltar
        window.addEventListener('popstate', (e) => {
            if (rjModal.classList.contains('is-open')) {
                closeModal();
            }
        });


    </script>
</body>

</html>
